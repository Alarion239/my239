services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my239
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    # AOF disabled — rate-limit counters are ephemeral by design; Redis
    # restarting just resets buckets, which is the safe failure mode.
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Required
      DATABASE_URL: postgres://postgres:postgres@db:5432/my239?sslmode=disable
      JWT_SECRET: change-me-in-production-this-must-be-at-least-32-chars

      # Optional (shown with their defaults)
      PORT: "8080"
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: info
      JWT_ISSUER: my239
      JWT_AUDIENCE: api
      JWT_ACCESS_TTL_MINUTES: "15"
      JWT_REFRESH_TTL_DAYS: "30"

      # Rate limiting: when REDIS_URL is set the limiter switches from
      # in-memory to Redis-backed. Leave empty for the memory fallback.
      REDIS_URL: redis://redis:6379/0

      # Object storage. With S3_BUCKET unset the backend uses its in-process
      # in-memory store, so local Compose needs zero object-storage setup
      # (browser PDF download/upload is unavailable in that mode, which is
      # fine for local work). To exercise real storage locally, point these
      # at a Yandex Object Storage bucket:
      #   S3_BUCKET: <bucket>
      #   S3_ACCESS_KEY_ID: <key>
      #   S3_SECRET_ACCESS_KEY: <secret>
      # Defaults handle the rest (endpoint storage.yandexcloud.net, region
      # ru-central1, path-style addressing).

  # The frontend container is nginx-only at runtime: a multi-stage build
  # compiles the Vite bundle inside a node image and the final image just
  # serves the static files. nginx also reverse-proxies /api/* to the backend
  # so the browser sees same-origin requests (no CORS, no API_URL threading).
  frontend:
    build:
      # Build context is the frontend/ workspace root (not just web/) so
      # the multi-stage Dockerfile can install the npm workspace with
      # shared/ symlinked in alongside web/.
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    # The nginx config is templated (web/nginx.conf.template) so the same image
    # runs in Compose and on Railway. The DNS resolver is auto-detected by the
    # image (NGINX_LOCAL_RESOLVERS); only the backend address differs per env.
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8080"
    ports:
      - "3000:80"

volumes:
  pgdata:
  redisdata:
