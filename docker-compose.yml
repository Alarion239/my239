services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my239
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    # AOF disabled — rate-limit counters are ephemeral by design; Redis
    # restarting just resets buckets, which is the safe failure mode.
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO is an S3-compatible object store used in dev to mirror the prod
  # presigned-redirect flow (Yandex Object Storage in real deployments).
  # Default CORS is "*", so the browser can follow the redirect from the
  # backend to a presigned URL on localhost:9000 without extra config.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: [ "server", "/data", "--console-address", ":9001" ]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    volumes:
      - miniodata:/data

  # One-shot bucket bootstrap: waits for MinIO to come up, then creates the
  # dev bucket if it doesn't exist. Exits with 0 on success so the backend
  # can gate startup on it via service_completed_successfully.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio12345 >/dev/null 2>&1; do
        echo 'waiting for minio...';
        sleep 1;
      done;
      mc mb --ignore-existing local/my239-dev;
      echo 'minio bucket ready';
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      # Required
      DATABASE_URL: postgres://postgres:postgres@db:5432/my239?sslmode=disable
      JWT_SECRET: change-me-in-production-this-must-be-at-least-32-chars

      # Optional (shown with their defaults)
      PORT: "8080"
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: info
      JWT_ISSUER: my239
      JWT_AUDIENCE: api
      JWT_ACCESS_TTL_MINUTES: "15"
      JWT_REFRESH_TTL_DAYS: "30"

      # Rate limiting: when REDIS_URL is set the limiter switches from
      # in-memory to Redis-backed. Leave empty for the memory fallback.
      REDIS_URL: redis://redis:6379/0

      # Object storage (MinIO in dev, Yandex Object Storage in prod).
      # Setting S3_BUCKET switches the backend off the in-memory fallback
      # and onto a real S3-compatible client.
      #
      # S3_ENDPOINT is the address the backend uses to talk to MinIO inside
      # the Docker network; S3_PUBLIC_ENDPOINT is what gets stamped into
      # presigned URLs so the BROWSER can reach the same bucket via
      # localhost. Without the rewrite the browser would try to resolve
      # "minio" and fail with ERR_NAME_NOT_RESOLVED.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: my239-dev
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio12345
      S3_USE_PATH_STYLE: "true"

  # The frontend container is nginx-only at runtime: a multi-stage build
  # compiles the Vite bundle inside a node image and the final image just
  # serves the static files. nginx also reverse-proxies /api/* to the backend
  # so the browser sees same-origin requests (no CORS, no API_URL threading).
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  redisdata:
  miniodata:
