name: backend-lint

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-lint.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-lint.yml"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6.0
          working-directory: backend
