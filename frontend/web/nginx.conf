server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path falls through to index.html so
    # client-side routing works after a hard reload.
    location / {
        try_files $uri /index.html;
    }

    # Reverse-proxy /api/* (and the health probes) to the backend service.
    # Same-origin requests mean the browser never sees CORS, the frontend
    # never has to know what host the backend is on, and rate-limit headers
    # like Retry-After flow through unchanged.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /healthz { proxy_pass http://backend:8080/healthz; }
    location = /readyz  { proxy_pass http://backend:8080/readyz;  }

    # Cache static assets aggressively — Vite emits content-hashed file
    # names so a long max-age is safe.
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
